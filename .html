<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="總統大選相關資訊">
    <title>總統大選</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 0;
            color: #333;
        }
        header {
            background-color: #0066cc;
            color: white;
            padding: 20px;
            text-align: center;
        }
        nav {
            background-color: #003366;
            padding: 10px;
        }
        nav a {
            color: white;
            padding: 10px;
            text-decoration: none;
            margin: 5px;
        }
        nav a:hover {
            background-color: #0055a5;
        }
        .main-content {
            padding: 20px;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
        .section {
            margin-bottom: 30px;
        }
        .section h2 {
            color: #0066cc;
        }
        .section p {
            font-size: 16px;
        }
    </style>

<body>

    <header>
        <h1>2024 總統大選</h1>
    </header>

    <nav>
        <a href="#overview">大選概覽</a>
        <a href="#candidates">候選人介紹</a>
        <a href="#polls">最新民調</a>
        <a href="#news">選舉新聞</a>
    </nav>

    <div class="main-content">
        <section id="overview" class="section">
            <h2>大選概覽</h2>
            <p>2024年總統大選將決定新一屆的國家領袖，選舉將於2024年1月14日舉行。選舉候選人來自不同政黨，選民將根據各候選人的政見及政策來做出選擇。</p>
        </section>

        <section id="candidates" class="section">
            <h2>候選人介紹</h2>
            <p>本次選舉有多位候選人參選，包括現任總統及多位黨內領袖。每位候選人都提出不同的政見，並積極推動改革計畫。</p>
        </section>

        <section id="polls" class="section">
            <h2>最新民調</h2>
            <p>根據最近的民調結果，候選人之間的支持度差異仍然存在，選舉結果尚難預測。隨著選舉日的臨近，民調數字可能會發生變化。</p>
        </section>

        <section id="news" class="section">
            <h2>選舉新聞</h2>
            <p>隨著選舉的進行，候選人之間的辯論和新聞報導成為關注焦點。各種新聞及評論也不斷地影響選民的看法。</p>
        </section>
    </div>

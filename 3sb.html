<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情緒平衡之旅：為上班族設計</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f9f9f9;
            margin: 0;
            padding: 0;
            color: #333;
        }
        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
            background-color: #ffffff;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            text-align: center;
        }
        h1 {
            color: #ff4081;
            font-size: 2.5em;
            margin-bottom: 20px;
            font-weight: bold;
        }
        h2 {
            color: #444;
            font-size: 1.5em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.2em;
            line-height: 1.8;
            margin-bottom: 20px;
        }
        .cta {
            display: inline-block;
            padding: 15px 30px;
            background-color: #ff4081;
            color: white;
            font-size: 1.2em;
            border-radius: 50px;
            text-decoration: none;
            transition: background-color 0.3s, transform 0.3s;
        }
        .cta:hover {
            background-color: #e0376a;
            transform: scale(1.05);
        }
        .footer {
            margin-top: 30px;
            font-size: 0.9em;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>是不是每天都很焦慮？</h1>
        <h2>別擔心！「情緒平衡之旅」來幫你！</h2>
        <p>上班族的生活壓力大到快崩潰？那麼，是時候讓情緒平衡成為你的秘密武器了！我們為忙碌的上班族設計了一個完美的方案，幫你減壓、提升專注，輕鬆應對生活挑戰。</p>
        <p>還等什麼？加入我們，開始你的情緒管理之旅吧！</p>
        <a href="https://www.example.com" class="cta">快來，讓壓力消失！</a>
        <div class="footer">
            <p>為了自己的情緒和生活品質，現在就是時候！</p>
        </div>
    </div>
</body>
</html>
